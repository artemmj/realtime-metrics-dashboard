# nginx/nginx.conf

upstream backend_api {
    server backend-app:8080;
}

upstream frontend_dev {
    # Для разработки - подключаемся к Vite dev серверу
    server frontend-app:5173;  # localhost:5173 | host.docker.internal
    # Если используете Docker, замените на: server host.docker.internal:5173;
}

server {
    listen 80;
    server_name _; # Замените на ваш домен при деплое

    # Базовые настройки безопасности и производительности
    client_max_body_size 20M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    server_tokens off;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- BACKEND API ---
    location /api/ {
        # Слэш на конце отрезает префикс /api
        # /api/docs → http://backend_api:8080/docs ✅
        # /api/v1/auth/me → http://backend_api:8080/v1/auth/me ✅
        proxy_pass http://backend_api;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;


        # Таймауты для долгоживущих WS-соединений
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

        # --- FRONTEND (Vue) ---
    location / {
        # Для разработки - проксируем на Vite dev сервер
        proxy_pass http://frontend_dev;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Важно для Vite HMR (Hot Module Replacement)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Таймауты для долгих соединений (HMR)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check endpoint для самого Nginx
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
