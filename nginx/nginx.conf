# nginx/nginx.conf

upstream backend_api {
    server backend-app:8080;
}

server {
    listen 80;
    server_name _; # Замените на ваш домен при деплое
    
    # Базовые настройки безопасности и производительности
    client_max_body_size 20M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    
    # Скрытие версии Nginx
    server_tokens off;

    # Gzip сжатие (важно для GraphQL ответов и статики)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- BACKEND API & GRAPHQL ---
    # Проксируем все запросы к API и GraphQL на FastAPI
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Поддержка WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- FUTURE FRONTEND (REFINE/REACT) ---
    # Когда соберете фронт, раскомментируйте этот блок.
    # Для SPA важно, чтобы все несуществующие пути возвращали index.html
    # 
    # root /usr/share/nginx/html;
    # index index.html;
    #
    # location / {
    #     try_files $uri $uri/ /index.html;
    #     
    #     # Кэширование статики (Vite/Webpack хешируют имена файлов)
    #     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }

    # Временная заглушка, пока фронта нет
    location = / {
        default_type text/html;
        return 200 "<h1>Backend is running</h1><p>Frontend will be available here soon.</p><ul><li><a href='/graphql'>GraphiQL</a></li><li><a href='/api/docs'>Swagger</a></li></ul>";
    }

    # Health check endpoint для самого Nginx
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}