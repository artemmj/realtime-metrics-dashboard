# nginx/nginx.conf

upstream backend_api {
    server backend-app:8080;
}

server {
    listen 80;
    server_name _; # Замените на ваш домен при деплое

    # Базовые настройки безопасности и производительности
    client_max_body_size 20M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;

    server_tokens off;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- BACKEND API ---
    location /api/ {
        # Слэш на конце отрезает префикс /api
        # /api/docs → http://backend_api:8080/docs ✅
        # /api/v1/auth/me → http://backend_api:8080/v1/auth/me ✅
        proxy_pass http://backend_api;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OpenAPI schema (нужна для работы Swagger UI)
    # location = /openapi.json {
    #     proxy_pass http://backend_api/openapi.json;
    #     proxy_set_header Host $host;
    # }

    # Временная заглушка, пока фронта нет
    location = / {
        default_type text/html;
        return 200 "<h1>Backend is running</h1><p>Frontend will be available here soon.</p><ul><li><a href='/api/docs'>Swagger</a></li></ul>";
    }

    # Health check endpoint для самого Nginx
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
