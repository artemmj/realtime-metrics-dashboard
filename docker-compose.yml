name: backend

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"       # Основной вход
      - "443:443"     # Задел под SSL (Let's Encrypt/Certbot)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Для продакшена - собранный фронт:
      # - ./frontend/dist:/usr/share/nginx/html:ro
      # Для разработки (раскомментировать если нужно):
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - backend-nw
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-app
    restart: unless-stopped
    # CHANGED: Убрали прямой доступ к порту 8080 извне.
    # Теперь трафик идет только через Nginx.
    expose:
      - "8080"
    environment:
      SECRET_KEY: ${SECRET_KEY:-supersecret}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    networks:
      - backend-nw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - db

  db:
    image: postgres:18
    container_name: backend-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # CHANGED: Redis не должен быть доступен извне в продакшене
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-nw

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery_worker
    restart: unless-stopped
    command: uv run celery -A src.celery_app worker --loglevel=info --concurrency=1
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    networks:
      - backend-nw
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery_beat
    restart: unless-stopped
    command: uv run celery -A src.celery_app beat --loglevel=info
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-nw

  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Изоляция node_modules
    ports:
      - "5173:5173"  # Vite dev server
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - backend-nw

networks:
  backend-nw:
    driver: bridge

volumes:
  postgres_data: {}
  redis_data: {}
